<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>RouteAI</title>
  <meta name="theme-color" content="#141414" />
  <style>
    :root {
      color-scheme: dark;
      --bg:       #141414;
      --surface:  #1f1f1f;
      --surface2: #2a2a2a;
      --border:   #333;
      --text:     #e5e5e5;
      --muted:    #777;
      --header:   #000;
      --spinner-track: #333;

      --c0: #4ade80; --c0-bg: rgba(74,222,128,.12);  --c0-bd: rgba(74,222,128,.3);
      --c1: #60a5fa; --c1-bg: rgba(96,165,250,.12);  --c1-bd: rgba(96,165,250,.3);
      --c2: #f472b6; --c2-bg: rgba(244,114,182,.12); --c2-bd: rgba(244,114,182,.3);
      --c3: #fb923c; --c3-bg: rgba(251,146,60,.12);  --c3-bd: rgba(251,146,60,.3);
      --c4: #a1a1aa; --c4-bg: rgba(161,161,170,.1);  --c4-bd: rgba(161,161,170,.3);

      --v-w: 258px;
      --s-w: 145px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      overflow-x: hidden; }

    /* ── Netflix Nav ── */
    #nf-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 68px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4%;
      background: linear-gradient(to bottom, rgba(0,0,0,.9) 0%, transparent 100%);
      transition: background .4s;
    }
    #nf-nav.solid { background: #141414; }
    .nf-logo {
      display: flex; flex-direction: column; justify-content: center;
      cursor: default; user-select: none; line-height: 1;
    }
    .nf-logo-main {
      font-size: 24px; font-weight: 900; letter-spacing: -1px;
      color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,.6);
    }
    .nf-nav-right { display: flex; align-items: center; gap: 12px; }
    .upd-time { font-size: 11px; color: rgba(255,255,255,.4); }
    .btn-refresh {
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.85); width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .3s; flex-shrink: 0;
    }
    .btn-refresh:hover { background: #e50914; border-color: #e50914; color: #fff; }
    .btn-refresh:active { transform: rotate(180deg); }

    /* ── Sub-header info ── */
    .sub-info {
      background: var(--header); border-bottom: 1px solid var(--border);
      padding: 8px 24px; display: flex; align-items: center; gap: 10px;
    }
    .sub-info span { font-size: 12px; color: var(--muted); }

    /* ── Filter chips ── */
    .filter-bar {
      background: var(--header); border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; padding: 12px 24px;
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .chip {
      padding: 6px 14px; border-radius: 100px; white-space: nowrap;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 2px solid transparent; transition: all .15s;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
      user-select: none;
    }
    .chip .cnt { background: rgba(255,255,255,.18); border-radius: 100px; padding: 1px 6px; font-size: 10px; }
    .chip.active { border-color: currentColor; }
    .c-all   { background: rgba(229,9,20,.15);   color: #e50914; }
    .c-live  { background: rgba(220,38,38,.15);  color: #f87171; }
    .c-video { background: rgba(96,165,250,.15); color: #60a5fa; }
    .c-short { background: rgba(251,146,60,.15); color: #fb923c; }

    /* ── Main ── */
    main { padding: 4px 0 60px; }

    /* ── Time section ── */
    .t-section { margin-bottom: 8px; }
    .t-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 36px 24px 10px;
    }
    .t-head-left { display: flex; align-items: center; gap: 10px; }
    .t-dot { display: none; }
    .t-name {
      font-size: 22px; font-weight: 700; color: #e5e5e5;
      letter-spacing: -.4px;
    }
    .t-badge {
      font-size: 10px; font-weight: 800; letter-spacing: .7px;
      text-transform: uppercase; padding: 3px 8px; border-radius: 4px;
      align-self: center; line-height: 1;
    }
    .ts-0 .t-badge { background: rgba(74,222,128,.12);  color: var(--c0); border: 1px solid rgba(74,222,128,.25); }
    .ts-1 .t-badge { background: rgba(96,165,250,.12);  color: var(--c1); border: 1px solid rgba(96,165,250,.25); }
    .ts-3 .t-badge { background: rgba(251,146,60,.12);  color: var(--c3); border: 1px solid rgba(251,146,60,.25); }
    .ts-4 .t-badge { background: rgba(161,161,170,.12); color: var(--c4); border: 1px solid rgba(161,161,170,.25); }
    .t-cnt { font-size: 13px; color: var(--muted); }
    .t-divider { display: none; }

    /* ── Rail wrapper ── */
    .rail-wrap { position: relative; margin-bottom: 2px; }
    .rail-label {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 24px 6px; font-size: 12px; color: var(--muted);
    }
    .rl-badge {
      font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 4px;
    }
    .rl-live  { background: rgba(220,38,38,.25);  color: #f87171; }
    .rl-video { background: rgba(59,130,246,.2);  color: #60a5fa; }
    .rl-short { background: rgba(251,146,60,.2);  color: #fb923c; }

    /* ── Rail (horizontal scroll) ── */
    .rail {
      display: flex;
      flex-wrap: nowrap;
      gap: 12px;
      padding: 4px 24px 16px;
      overflow-x: auto;
      overflow-y: visible;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      -webkit-overflow-scrolling: touch;
    }
    .rail::-webkit-scrollbar { height: 4px; }
    .rail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Arrow buttons ── */
    .arr {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer; z-index: 5;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
      transition: background .15s, opacity .2s;
    }
    .arr:hover { background: #ef4444; border-color: #ef4444; color: #fff; }
    .arr.hidden { opacity: 0; pointer-events: none; }
    .arr-l { left: 4px; }
    .arr-r { right: 4px; }
    .arr svg { width: 16px; height: 16px; }

    /* ── Cards ── */
    .card {
      flex: 0 0 auto;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      text-decoration: none; color: inherit;
      transition: transform .2s, box-shadow .2s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,.35); }

    .card-v { width: var(--v-w); }
    .card-v .thumb { aspect-ratio: 16/9; }
    .card-s { width: var(--s-w); }
    .card-s .thumb { height: 240px; }

    .thumb {
      position: relative; background: var(--surface2); overflow: hidden;
    }
    .thumb img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform .3s;
    }
    .card:hover .thumb img { transform: scale(1.05); }
    .thumb-err {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: var(--surface2); color: var(--border); font-size: 26px;
    }

    .badge {
      position: absolute; font-size: 10px; font-weight: 800;
      padding: 2px 6px; border-radius: 4px; letter-spacing: .3px;
    }
    .badge-new  { top: 6px; right: 6px;   background: #2563eb; color: #fff; }
    .badge-live { top: 6px; left: 6px;   background: #dc2626; color: #fff; }
    .badge-when { bottom: 6px; left: 6px; background: rgba(0,0,0,.78); color: #fff; border-radius: 4px; }

    .play-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .card:hover .play-wrap { background: rgba(0,0,0,.25); }
    .play-btn {
      width: 38px; height: 38px; background: rgba(255,255,255,.88); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(.8); transition: all .2s;
    }
    .play-btn svg { width: 15px; height: 15px; fill: #111; margin-left: 3px; }
    .card:hover .play-btn { opacity: 1; transform: scale(1); }

    .card-body { padding: 8px 10px 10px; }
    .card-title {
      font-size: 12.5px; font-weight: 600; line-height: 1.4; color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 5px;
    }
    .card-views { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    /* ── Load-more (지난주 이상) ── */
    .load-more-card {
      flex: 0 0 auto; width: var(--v-w);
      background: var(--surface2); border: 1px dashed var(--border);
      border-radius: 10px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      cursor: pointer; color: var(--muted); text-decoration: none;
      transition: border-color .2s, color .2s;
      min-height: 160px;
    }
    .load-more-card.short-size { width: var(--s-w); min-height: 240px; }
    .load-more-card:hover { border-color: #ef4444; color: #ef4444; }
    .load-more-card svg { width: 28px; height: 28px; }
    .load-more-card span { font-size: 12px; font-weight: 600; }

    /* ── Video detail modal (Netflix style) ── */
    #vd-overlay {
      position: fixed; inset: 0; z-index: 8500;
      background: rgba(0,0,0,.75); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    #vd-modal {
      background: #181818; border-radius: 10px;
      width: 100%; max-width: 860px;
      max-height: 90vh; overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,.8);
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform:translateY(30px); opacity:0 } to { transform:translateY(0); opacity:1 } }
    #vd-close {
      position: absolute; top: 14px; right: 14px; z-index: 2;
      width: 36px; height: 36px; border-radius: 50%;
      background: #181818; border: none; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    #vd-close:hover { background: #333; }
    #vd-video-wrap {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: #000; border-radius: 10px 10px 0 0; overflow: hidden;
    }
    #vd-video-wrap iframe {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
    }
    #vd-video-grad {
      position: absolute; bottom: 0; left: 0; right: 0; height: 35%;
      background: linear-gradient(to top, #181818 0%, transparent 100%);
      pointer-events: none;
    }
    #vd-replay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      padding: 10px 24px; border-radius: 4px; z-index: 2;
      background: rgba(0,0,0,.65); border: 2px solid rgba(255,255,255,.55);
      color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background .2s; white-space: nowrap;
    }
    #vd-replay:hover { background: rgba(255,255,255,.18); }
    #vd-body { padding: 20px 28px 28px; }
    #vd-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    #vd-ch {
      font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,.5);
    }
    #vd-title {
      font-size: clamp(16px, 2.2vw, 24px); font-weight: 800;
      color: #fff; line-height: 1.3; margin-bottom: 18px;
    }
    #vd-actions { display: flex; gap: 10px; }
    #vd-yt-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px; border-radius: 4px;
      background: #e50914; color: #fff;
      font-size: 14px; font-weight: 700;
      text-decoration: none; border: none; cursor: pointer;
      transition: background .2s;
    }
    #vd-yt-btn:hover { background: #c0000f; }
    #vd-unmute {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px; border-radius: 4px;
      background: rgba(109,109,110,.7); color: #fff;
      font-size: 14px; font-weight: 700; cursor: pointer;
      border: none; transition: background .2s;
    }
    #vd-unmute:hover { background: rgba(109,109,110,.5); }
    #vd-unmute.on svg.ico-mute { display: none; }
    #vd-unmute:not(.on) svg.ico-sound { display: none; }
    @media (max-width: 640px) {
      .vd-btn-text { white-space: nowrap; }
      #vd-unmute, #vd-yt-btn { padding: 10px 14px; font-size: 13px; }
    }

    /* ── YouTube redirect popup ── */
    #yt-popup-overlay {
      position: fixed; inset: 0; z-index: 8000;
      background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
    }
    #yt-popup {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 32px 28px 24px;
      max-width: 380px; width: 90%; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    #yt-popup .yt-popup-icon { font-size: 36px; margin-bottom: 14px; }
    #yt-popup p {
      color: var(--text); font-size: 14px; line-height: 1.7;
      margin: 0 0 24px;
    }
    .yt-popup-btns { display: flex; flex-direction: column; gap: 10px; }
    .yt-popup-btns a {
      display: block; padding: 11px 20px; border-radius: 8px;
      font-size: 13px; font-weight: 700; text-decoration: none;
      transition: background .2s, opacity .2s;
    }
    .yt-popup-btns a.btn-ch1 { background: #e50914; color: #fff; }
    .yt-popup-btns a.btn-ch1:hover { background: #c0000f; }
    .yt-popup-btns button {
      padding: 10px 20px; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: var(--surface2); color: var(--muted);
      border: 1px solid var(--border); transition: background .2s, color .2s;
    }
    .yt-popup-btns button:hover { background: var(--border); color: var(--text); }

    /* ── States ── */
    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 100px 24px; gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--spinner-track); border-top-color: #ef4444;
      border-radius: 50%; animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--muted); font-size: 14px; }

    #err-msg {
      display: none; margin: 24px; padding: 20px;
      background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25);
      border-radius: 10px; color: var(--muted); font-size: 13px;
    }
    #content { display: none; }

    @media (max-width: 640px) {
      :root { --v-w: 210px; --s-w: 128px; }
      .filter-bar, .rail { padding-left: 14px; padding-right: 14px; }
      .t-head { padding: 16px 14px 8px; }
      .rail-label { padding-left: 14px; }
      .card-s .thumb { height: 200px; }
    }
  </style>
</head>
<body>

<!-- ── Netflix Nav ── -->
<nav id="nf-nav">
  <div class="nf-logo">
    <span class="nf-logo-main">RouteAI</span>
  </div>
  <div class="nf-nav-right">
    <span class="upd-time" id="upd-time"></span>
    <button class="btn-refresh" onclick="loadVideos()" title="새로고침">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
    </button>
  </div>
</nav>

<!-- ── Sub info + Filter ── -->
<div id="content" style="padding-top:68px">
  <div class="sub-info">
    <span id="sub-text">불러오는 중…</span>
  </div>
  <div class="filter-bar">
    <div class="chip c-all active" onclick="setFilter(this,'all')">📺 전체 <span class="cnt" id="cnt-all">0</span></div>
    <div class="chip c-live"  onclick="setFilter(this,'live')">🔴 라이브 <span class="cnt" id="cnt-live">0</span></div>
    <div class="chip c-video" onclick="setFilter(this,'video')">▶ 동영상 <span class="cnt" id="cnt-video">0</span></div>
    <div class="chip c-short" onclick="setFilter(this,'short')">⚡ Shorts <span class="cnt" id="cnt-short">0</span></div>
  </div>
  <main id="main-content"></main>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>영상 데이터 불러오는 중…</p>
</div>
<div id="err-msg">영상 데이터를 불러오지 못했습니다. 잠시 후 새로고침해 주세요.</div>

<script>
history.scrollRestoration = 'manual';  // 새로고침 시 항상 최상단에서 시작
const YT_URL = 'https://www.youtube.com/@routeai/videos';
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

const CATS = [
  { id:0, label:'오늘',        badge:'TODAY',     cls:'ts-0' },
  { id:1, label:'어제',        badge:'YESTERDAY', cls:'ts-1' },
  { id:2, label:'이번 주',     badge:'THIS WEEK', cls:'ts-3' },
  { id:3, label:'일주일 이상 지난 영상들', badge:'OLDER', cls:'ts-4' },
];

// 지난주 이상: 처음 3개만, 이후 lazy load
const LAZY_CAT   = 3;
const LAZY_INIT  = 3;
const LAZY_BATCH = 7;

// lazy store: { live: [...], video: [...], short: [...] }
const lazyStore  = { live: [], video: [], short: [] };
const lazyOffset = { live: 0, video: 0, short: 0 };

function isLiveVideo(v) {
  return v.type === 'live' || /\[?LIVE\]?|라이브/i.test(v.title);
}


function getBucket(pub) {
  const today = new Date(); today.setHours(0,0,0,0);
  const ago = n => new Date(+today - n * 86400_000);
  if (pub >= today)  return 0;
  if (pub >= ago(1)) return 1;
  if (pub >= ago(7)) return 2;  // 이번 주 (2~7일 전, 3일 전 포함)
  return 3;
}

// ── Load ─────────────────────────────────────────────────
async function loadVideos() {
  show('loading', true);
  show('content', false);
  show('err-msg', false);

  const fromJson = await fetchDataJson();
  if (fromJson?.videos?.length) {
    show('loading', false);
    render(fromJson.videos);
    setTxt('sub-text', `영상 ${fromJson.videos.length}개`);
    setTxt('upd-time', fmtTime(new Date()));
    return;
  }
  const fresh = await scrapeYouTubePage();
  show('loading', false);
  if (fresh?.length) {
    render(fresh);
    setTxt('sub-text', `영상 ${fresh.length}개`);
    setTxt('upd-time', fmtTime(new Date()));
  } else {
    show('err-msg', true);
  }
}

async function fetchDataJson() {
  try {
    const r = await fetch('./data.json', { signal: AbortSignal.timeout(5000) });
    if (!r.ok) return null;
    const d = await r.json();
    if (!d.videos?.length) return null;
    d.videos = d.videos.map(v => ({
      ...v,
      publishedAt: new Date(v.publishedAt),
      type: v.type || 'video',
      channelLabel: v.channelLabel || 'RouteAI',
    }));
    return d;
  } catch { return null; }
}

async function scrapeYouTubePage() {
  const html = await raceProxies(YT_URL);
  if (!html) return null;
  try {
    const idx = html.indexOf('var ytInitialData = ');
    if (idx < 0) return null;
    const s = html.indexOf('{', idx);
    let d = 0, i = s;
    for (; i < html.length; i++) {
      if (html[i] === '{') d++;
      else if (html[i] === '}') { d--; if (!d) break; }
    }
    return parseYtData(JSON.parse(html.slice(s, i + 1)));
  } catch { return null; }
}

async function raceProxies(url) {
  return new Promise(res => {
    let done = false, pending = PROXIES.length;
    PROXIES.forEach(mk => {
      fetch(mk(url), { signal: AbortSignal.timeout(14000) })
        .then(async r => {
          const t = await r.text();
          if (!t.includes('ytInitialData')) throw 0;
          if (!done) { done = true; res(t); }
        })
        .catch(() => { if (--pending === 0 && !done) res(null); });
    });
  });
}

function parseYtData(data) {
  const tabs = data?.contents?.twoColumnBrowseResultsRenderer?.tabs ?? [];
  let items = null;
  for (const tab of tabs) {
    const c = tab.tabRenderer?.content;
    if (!c) continue;
    const g = c.richGridRenderer?.contents
      ?? c.sectionListRenderer?.contents?.[0]?.itemSectionRenderer?.contents?.[0]?.gridRenderer?.items;
    if (g?.length) { items = g; break; }
  }
  if (!items) return null;
  const now = new Date();
  return items.map(item => {
    const vr = item.richItemRenderer?.content?.videoRenderer ?? item.gridVideoRenderer ?? item.videoRenderer;
    if (!vr?.videoId) return null;
    const id = vr.videoId;
    const tt = vr.publishedTimeText?.simpleText ?? '';
    return {
      id, type: 'video',
      channelLabel: 'RouteAI',
      title: vr.title?.runs?.[0]?.text ?? vr.title?.simpleText ?? '',
      thumb: `https://i.ytimg.com/vi/${id}/mqdefault.jpg`,
      publishedAt: parseRel(tt, now), timeText: tt,
      views: parseViews(vr.viewCountText?.simpleText ?? ''),
      url: `https://www.youtube.com/watch?v=${id}`,
    };
  }).filter(Boolean);
}

// ── Render ────────────────────────────────────────────────
function render(videos) {
  const buckets = CATS.map(() => ({ lives: [], videos: [], shorts: [] }));
  videos.forEach(v => {
    const b = getBucket(v.publishedAt instanceof Date ? v.publishedAt : new Date(v.publishedAt));
    const type = v.type || 'video';
    // LIVE takes priority over short/video
    if (isLiveVideo(v))           buckets[b].lives.push(v);
    else if (type === 'short')    buckets[b].shorts.push(v);
    else                          buckets[b].videos.push(v);
  });

  const totals = buckets.map(b => b.lives.length + b.videos.length + b.shorts.length);
  setTxt('cnt-all',   videos.length);
  setTxt('cnt-live',  buckets.reduce((s, b) => s + b.lives.length,  0));
  setTxt('cnt-video', buckets.reduce((s, b) => s + b.videos.length, 0));
  setTxt('cnt-short', buckets.reduce((s, b) => s + b.shorts.length, 0));

  // Init lazy store
  lazyStore.live   = buckets[LAZY_CAT].lives;
  lazyStore.video  = buckets[LAZY_CAT].videos;
  lazyStore.short  = buckets[LAZY_CAT].shorts;
  lazyOffset.live  = 0;
  lazyOffset.video = 0;
  lazyOffset.short = 0;

  const main = document.getElementById('main-content');
  main.innerHTML = '';

  CATS.forEach((cat, i) => {
    const { lives, videos: vids, shorts } = buckets[i];
    if (!lives.length && !vids.length && !shorts.length) return;

    const sec = document.createElement('div');
    sec.className = `t-section ${cat.cls}`;
    sec.id = `sec-${i}`;

    // Section header
    const head = document.createElement('div');
    head.className = 't-head';
    head.innerHTML = `
      <div class="t-head-left">
        <span class="t-name">${cat.label}</span>
        <span class="t-badge">${cat.badge}</span>
      </div>
      <span class="t-cnt">${totals[i]}개</span>`;
    sec.appendChild(head);

    if (i === LAZY_CAT) {
      // Lazy: show first LAZY_INIT — order: 라이브 → Shorts → 동영상
      if (lazyStore.live.length)
        sec.appendChild(buildRail(lazyStore.live.slice(0, LAZY_INIT),  'live',  i, true));
      if (lazyStore.short.length)
        sec.appendChild(buildRail(lazyStore.short.slice(0, LAZY_INIT), 'short', i, true));
      if (lazyStore.video.length)
        sec.appendChild(buildRail(lazyStore.video.slice(0, LAZY_INIT), 'video', i, true));
      lazyOffset.live  = Math.min(LAZY_INIT, lazyStore.live.length);
      lazyOffset.short = Math.min(LAZY_INIT, lazyStore.short.length);
      lazyOffset.video = Math.min(LAZY_INIT, lazyStore.video.length);
    } else {
      // Order: 라이브 → Shorts → 동영상
      if (lives.length)  sec.appendChild(buildRail(lives,  'live',  i, false));
      if (shorts.length) sec.appendChild(buildRail(shorts, 'short', i, false));
      if (vids.length)   sec.appendChild(buildRail(vids,   'video', i, false));
    }

    const div = document.createElement('div');
    div.className = 't-divider';
    sec.appendChild(div);
    main.appendChild(sec);
  });

  show('content', true);
}

// ── Build Rail ────────────────────────────────────────────
function buildRail(items, type, catIdx, isLazy) {
  const wrap = document.createElement('div');
  wrap.className = 'rail-wrap';
  wrap.dataset.type = type;

  const isShort = type === 'short';
  const isLive  = type === 'live';
  const lbl     = isShort ? 'Shorts' : isLive ? '🔴 라이브' : '동영상';
  const badge   = isShort ? 'rl-short' : isLive ? 'rl-live' : 'rl-video';
  const railId  = `rail-${type}-${catIdx}`;

  // Label row
  const labelDiv = document.createElement('div');
  labelDiv.className = 'rail-label';
  labelDiv.innerHTML = `<span class="rl-badge ${badge}">${lbl}</span>`;
  wrap.appendChild(labelDiv);

  // Arrow Left
  const arrL = document.createElement('button');
  arrL.className = 'arr arr-l hidden';
  arrL.setAttribute('aria-label', '이전');
  arrL.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>`;
  wrap.appendChild(arrL);

  // Rail
  const rail = document.createElement('div');
  rail.className = 'rail';
  rail.id = railId;
  items.forEach(v => rail.insertAdjacentHTML('beforeend', cardHTML(v)));
  wrap.appendChild(rail);

  // Arrow Right
  const arrR = document.createElement('button');
  arrR.className = 'arr arr-r';
  arrR.setAttribute('aria-label', '다음');
  arrR.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;
  wrap.appendChild(arrR);

  // Arrow click handlers
  const cardW = isShort ? parseInt(getComputedStyle(document.documentElement).getPropertyValue('--s-w')) || 145
                        : parseInt(getComputedStyle(document.documentElement).getPropertyValue('--v-w')) || 258;

  arrL.onclick = () => rail.scrollTo({ left: Math.max(0, rail.scrollLeft - (cardW + 12) * 3), behavior: 'smooth' });
  arrR.onclick = () => rail.scrollTo({ left: Math.min(rail.scrollWidth - rail.clientWidth, rail.scrollLeft + (cardW + 12) * 3), behavior: 'smooth' });

  // Update arrow visibility on scroll
  const updateArrows = () => {
    const atStart = rail.scrollLeft <= 2;
    const atEnd   = rail.scrollLeft + rail.clientWidth >= rail.scrollWidth - 4;
    arrL.classList.toggle('hidden', atStart);
    arrR.classList.toggle('hidden', atEnd);

    // Lazy load: fetch more when near the end
    if (isLazy && atEnd) loadMoreLazy(type, rail, arrR, isShort);
  };

  rail.addEventListener('scroll', updateArrows, { passive: true });

  // Initial arrow state (after layout)
  requestAnimationFrame(() => updateArrows());

  return wrap;
}

// ── Lazy Load ────────────────────────────────────────────
function loadMoreLazy(type, rail, arrR, isShort) {
  const store  = lazyStore[type];
  const offset = lazyOffset[type];

  // All local items loaded — show YouTube fetch button
  if (offset >= store.length) {
    if (!rail.querySelector('.fetch-more-card'))
      addFetchMoreCard(rail, type, isShort);
    return;
  }

  const batch = store.slice(offset, offset + LAZY_BATCH);
  if (!batch.length) return;

  // Remove existing placeholders
  rail.querySelectorAll('.load-more-card, .fetch-more-card').forEach(el => el.remove());

  batch.forEach(v => rail.insertAdjacentHTML('beforeend', cardHTML(v)));
  lazyOffset[type] += batch.length;

  if (lazyOffset[type] < store.length) {
    addLoadMoreCard(rail, type, arrR, isShort);
  } else {
    addFetchMoreCard(rail, type, isShort);
  }

  requestAnimationFrame(() => {
    const atEnd = rail.scrollLeft + rail.clientWidth >= rail.scrollWidth - 4;
    arrR.classList.toggle('hidden', atEnd);
  });
}

function addLoadMoreCard(rail, type, arrR, isShort) {
  const remaining = lazyStore[type].length - lazyOffset[type];
  const card = document.createElement('div');
  card.className = `load-more-card${isShort ? ' short-size' : ''}`;
  card.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="8 12 12 16 16 12"/>
      <line x1="12" y1="8" x2="12" y2="16"/>
    </svg>
    <span>+${remaining}개 더 보기</span>`;
  card.onclick = () => { card.remove(); loadMoreLazy(type, rail, arrR, isShort); };
  rail.appendChild(card);
}

function addFetchMoreCard(rail, type, isShort) {
  if (rail.querySelector('.fetch-more-card')) return;
  const card = document.createElement('div');
  card.className = `load-more-card fetch-more-card${isShort ? ' short-size' : ''}`;
  card.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    <span>더 많은 영상 보러가기</span>`;
  card.onclick = () => showYtPopup();
  rail.appendChild(card);
}

// ── Card HTML ────────────────────────────────────────────
function cardHTML(v) {
  const isLive  = isLiveVideo(v);
  const type    = v.type || 'video';
  const isShort = !isLive && type === 'short';   // LIVE overrides short
  const isNew   = !isLive && (Date.now() - new Date(v.publishedAt)) < 6 * 3600_000;
  const when    = v.timeText || relDate(new Date(v.publishedAt));
  const views   = v.views != null ? `👁 ${fmtN(v.views)}` : '';

  return `
<a class="card card-${isShort ? 's' : 'v'}" href="${esc(v.url)}" target="_blank" rel="noopener">
  <div class="thumb">
    <img src="${esc(v.thumb)}" alt="${esc(v.title)}" loading="lazy"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
    <div class="thumb-err">▶</div>
    ${isLive ? '<span class="badge badge-live">🔴 LIVE</span>' : ''}
    ${isNew  ? '<span class="badge badge-new">NEW</span>' : ''}
    <span class="badge badge-when">${when}</span>
    <div class="play-wrap">
      <div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
    </div>
  </div>
  <div class="card-body">
    <div class="card-title">${esc(v.title)}</div>
    <div class="card-views">${views}</div>
  </div>
</a>`;
}

// ── Filter ───────────────────────────────────────────────
function setFilter(el, f) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');

  // Show/hide rail-wraps by type
  document.querySelectorAll('.rail-wrap').forEach(w => {
    w.style.display = (f === 'all' || w.dataset.type === f) ? '' : 'none';
  });

  // Hide date sections that have no visible rails
  document.querySelectorAll('.t-section').forEach(sec => {
    const hasVisible = [...sec.querySelectorAll('.rail-wrap')]
      .some(w => w.style.display !== 'none');
    sec.style.display = hasVisible ? '' : 'none';
  });

  // 스크롤 위치 유지 (필터 클릭 시 현재 위치에서 필터링)
}

// ── Helpers ──────────────────────────────────────────────
function show(id, on) {
  const el = document.getElementById(id);
  if (el) el.style.display = on ? (id === 'loading' ? 'flex' : 'block') : 'none';
}
function setTxt(id, v) { const el = document.getElementById(id); if (el) el.textContent = v; }
function fmtTime(d) {
  return `업데이트: ${d.toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}`;
}
let modalMuted = true;  // 모달 독립 음소거 상태
let modalTimer = null;  // 모달 1분 프리뷰 타이머

function showVideoModal(v) {
  if (!v || document.getElementById('vd-overlay')) return;
  const elapsed = heroStartedAt ? Math.floor((Date.now() - heroStartedAt) / 1000) : 0;
  const start   = Math.max(0, elapsed);

  // 히어로 음소거 → 모달이 소리를 담당
  const heroWasUnmuted = !heroMuted;
  setHeroMuted(true);
  modalMuted = !heroWasUnmuted;  // 히어로가 켜져 있었으면 모달도 켜짐

  const overlay = document.createElement('div');
  overlay.id = 'vd-overlay';
  overlay.innerHTML = `
    <div id="vd-modal">
      <button id="vd-close" onclick="closeVideoModal()" aria-label="닫기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div id="vd-video-wrap">
        <iframe id="vd-iframe"
          src="https://www.youtube-nocookie.com/embed/${esc(v.id)}?autoplay=1&mute=1&start=${start}&controls=0&disablekb=1&rel=0&modestbranding=1&iv_load_policy=3&enablejsapi=1&playsinline=1"
          style="pointer-events:none"

        <div id="vd-actions">
          <button id="vd-unmute" onclick="vdToggleMute()">
            <svg class="ico-mute" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M16.5 12A4.5 4.5 0 0 0 14 8v2.18l2.45 2.45c.05-.2.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 19l1.98 2L21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
            <svg class="ico-sound" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8v8a4.5 4.5 0 0 0 2.5-4zM14 3.23v2.06A6.5 6.5 0 0 1 14 20.71v2.06c3.88-.99 6.71-4.53 6.71-8.77S17.88 4.22 14 3.23z"/>
            </svg>
            <span class="vd-btn-text">소리 켜기</span>
          </button>
          <a id="vd-yt-btn" href="${esc(v.url || '#')}" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
            <span class="vd-btn-text">YouTube에서 보기</span>
          </a>
        </div>
      </div>
    </div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeVideoModal(); });
  document.body.appendChild(overlay);
  // iframe 로드 후 모달 소리 상태 적용
  setTimeout(() => applyModalMute(modalMuted), 800);

  // 1분 프리뷰 타이머 (히어로에서 이어받은 잔여 시간)
  clearTimeout(modalTimer);
  const remaining = Math.max(0, 60 - start);
  if (remaining <= 0) {
    stopModalVideo();
  } else {
    modalTimer = setTimeout(stopModalVideo, remaining * 1000);
  }
}

function stopModalVideo() {
  clearTimeout(modalTimer);
  const wrap = document.getElementById('vd-video-wrap');
  if (!wrap) return;
  document.getElementById('vd-iframe')?.remove();
  // 썸네일로 대체
  const v = window._heroVideo;
  if (v) {
    wrap.style.backgroundImage    = `url('${v.thumb}')`;
    wrap.style.backgroundSize     = 'cover';
    wrap.style.backgroundPosition = 'center';
  }
  // 소리 버튼 숨김
  const unmuteBtn = document.getElementById('vd-unmute');
  if (unmuteBtn) unmuteBtn.style.display = 'none';
  // 다시보기 버튼 표시
  if (!document.getElementById('vd-replay')) {
    const btn = document.createElement('button');
    btn.id = 'vd-replay';
    btn.textContent = '↺ 다시 보기';
    btn.onclick = modalReplay;
    wrap.appendChild(btn);
  }
}

function modalReplay() {
  const v = window._heroVideo;
  if (!v) return;
  const wrap = document.getElementById('vd-video-wrap');
  if (!wrap) return;
  document.getElementById('vd-replay')?.remove();
  wrap.style.backgroundImage = '';
  // iframe 재생성 (처음부터)
  const iframe = document.createElement('iframe');
  iframe.id = 'vd-iframe';
  iframe.src = `https://www.youtube-nocookie.com/embed/${esc(v.id)}?autoplay=1&mute=1&controls=0&disablekb=1&rel=0&modestbranding=1&iv_load_policy=3&enablejsapi=1&playsinline=1`;
  iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none;';
  iframe.allow = 'autoplay; encrypted-media';
  iframe.allowFullscreen = true;
  wrap.insertBefore(iframe, wrap.firstChild);
  // 소리 버튼 복원
  const unmuteBtn = document.getElementById('vd-unmute');
  if (unmuteBtn) unmuteBtn.style.display = '';
  modalMuted = true;
  applyModalMute(true);
  clearTimeout(modalTimer);
  modalTimer = setTimeout(stopModalVideo, 60000);
}

function applyModalMute(muted) {
  const cmd = muted ? 'mute' : 'unMute';
  document.getElementById('vd-iframe')
    ?.contentWindow?.postMessage(JSON.stringify({ event:'command', func:cmd, args:[] }), '*');
  const btn = document.getElementById('vd-unmute');
  if (btn) {
    btn.classList.toggle('on', !muted);
    btn.querySelector('.vd-btn-text').textContent = muted ? '소리 켜기' : '소리 끄기';
  }
}

function vdToggleMute() {
  modalMuted = !modalMuted;
  applyModalMute(modalMuted);
}

function closeVideoModal() {
  clearTimeout(modalTimer);
  document.getElementById('vd-overlay')?.remove();
}

function parseRel(t, now) {
  if (!t) return new Date(now - 30 * 86400_000);
  if (/^오늘|^today/i.test(t.trim()))     return new Date(now - 1 * 864e5);
  if (/^어제|^yesterday/i.test(t.trim())) return new Date(now - 1 * 864e5);
  const n = parseInt(t.match(/\d+/)?.[0] || '1');
  if (/second|초/.test(t))  return new Date(now - n * 1e3);
  if (/minute|분/.test(t))  return new Date(now - n * 6e4);
  if (/hour|시간/.test(t))  return new Date(now - n * 36e5);
  if (/day|일/.test(t))     return new Date(now - n * 864e5);
  if (/week|주/.test(t))    return new Date(now - n * 7 * 864e5);
  if (/month|개월/.test(t)) return new Date(now - n * 30 * 864e5);
  if (/year|년/.test(t))    return new Date(now - n * 365 * 864e5);
  return new Date(now - 30 * 864e5);
}
function relDate(d) {
  const s = (Date.now() - d) / 1000;
  if (s < 3600)   return `${Math.floor(s/60)}분 전`;
  if (s < 86400)  return `${Math.floor(s/3600)}시간 전`;
  if (s < 172800) return '어제';
  return `${Math.floor(s/86400)}일 전`;
}
function parseViews(t) { const m = t.replace(/,/g,'').match(/\d+/); return m ? +m[0] : null; }
function fmtN(n) {
  if (n >= 10000) return `${Math.floor(n/10000)}만`;
  if (n >= 1000)  return `${(n/1000).toFixed(1)}천`;
  return String(n);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


// Nav 스크롤 시 배경 solid
window.addEventListener('scroll', () => {
  document.getElementById('nf-nav').classList.toggle('solid', window.scrollY > 20);
}, { passive: true });

loadVideos();

// 백그라운드 복귀 시 데이터 갱신 (5분 이상 백그라운드였을 경우)
// visibilitychange: Android / 데스크탑
// pagehide / pageshow: iOS Safari / iPadOS PWA (WKWebView) 에서 더 신뢰성 있음
let _hiddenAt = 0;
function _onAppHidden()  { _hiddenAt = Date.now(); }
function _onAppVisible() {
  if (_hiddenAt > 0 && Date.now() - _hiddenAt > 5 * 60 * 1000) loadVideos();
  _hiddenAt = 0;
}
document.addEventListener('visibilitychange', () => {
  document.visibilityState === 'hidden' ? _onAppHidden() : _onAppVisible();
});
window.addEventListener('pagehide', _onAppHidden);
window.addEventListener('pageshow', e => { if (e.persisted) _onAppVisible(); });
</script>
